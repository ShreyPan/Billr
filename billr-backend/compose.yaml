services:
  postgres:
    image: postgres:16
    container_name: billr-postgres
    environment:
      POSTGRES_DB: billr
      POSTGRES_USER: billr_user
      POSTGRES_PASSWORD: billr_pass
    ports:
      - "5432:5432"
    volumes:
      - billr_pg_data:/var/lib/postgresql/data

volumes:
  billr_pg_data:
