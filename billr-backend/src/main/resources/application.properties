spring.application.name=billr-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billr}
spring.datasource.username=${DB_USERNAME:billr_user}
spring.datasource.password=${DB_PASSWORD:billr_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080

